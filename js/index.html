    <h1 id="count">0</h1>

        let count = 0;

function updateDisplay(){
    document.getElementById("count").textContent = count;
}
function increase(){
    count++;

}

function decrease(){
    count--;
    updateDisplay();
}

function resetCounter(){
    count = 0;
    updateDisplay();
}
